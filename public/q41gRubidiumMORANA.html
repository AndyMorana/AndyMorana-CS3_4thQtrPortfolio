<!DOCTYPE html>
<html>
<head>
<title>Add Movies Here</title>

<style>

body{
    font-family: Arial;
    background:#1c1c1c;
    margin:0;
}

/* for the main container */

.container{
    width:650px;
    margin:40px auto;
    background:#2b2b2b;
    padding:35px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    color:white;
}

/* For the title */

h1{
    text-align:center;
    color:#ff3b3b;
}

/* for the labels */

label{
    font-weight:bold;
    display:block;
    margin-top:20px;
}

/* for the inputs */

input, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
    background:#444;
    color:white;
}

/* for the button */

button{
    width:100%;
    margin-top:25px;
    padding:13px;
    background:#ff3b3b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e12c2c;
}

/* For the star rating */

.star{
    font-size:30px;
    cursor:pointer;
    color:#777;
}

.active{
    color:gold;
}

/* For the movie display box */

.movieCard{
    background:#3a3a3a;
    border:2px solid #555;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
}

.movieTitle{
    font-size:18px;
    font-weight:bold;
}

.movieStars{
    color:gold;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Add a Movie</h1>

<form id="movieForm">

<label>Title:</label>
<input type="text" id="title" required>

<label>Year:</label>
<input type="number" id="year" required>

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Fantasy</option>
<option>Horror</option>
<option>Science Fiction</option>
</select>

<label>Rating:</label>

<div id="starContainer">

<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>

</div>

<input type="hidden" id="rating" value="0">

<button type="submit">Add Movie</button>

</form>

<h1>Movie List</h1>

<div id="movieList"></div>

</div>

<script src="storage.js"></script>

</body>
</html>
